<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Mockup</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
    }

    header {
      background-color: #fff;
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
    }

    header .logo {
      font-size: 20px;
      font-weight: bold;
      color: red;
    }

    .container {
      display: flex;
      margin-top: 56px;
    }

    .sidebar {
      width: 200px;
      background-color: #fff;
      height: 100vh;
      padding: 20px 0;
      border-right: 1px solid #ddd;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
    }

    .sidebar li {
      padding: 10px 20px;
      cursor: pointer;
    }

    .sidebar li:hover {
      background-color: #f1f1f1;
    }

    .main {
      flex: 1;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .video {
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 5px;
      overflow: hidden;
    }

    .video img {
      width: 100%;
      display: block;
    }

    .video .info {
      padding: 10px;
    }

    .video .title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .video .channel {
      color: #606060;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">YouTube</div>
  </header>

  <div class="container">
    <div class="sidebar">
      <ul>
        <li>Home</li>
        <li>Trending</li>
        <li>Subscriptions</li>
        <li>Library</li>
      </ul>
    </div>

    <div class="main">
      <div class="video">
        <img src="https://via.placeholder.com/250x140" alt="Video thumbnail">
        <div class="info">
          <div class="title">Sample Video Title</div>
          <div class="channel">Channel Name</div>
        </div>
      </div>

      <!-- Repeat video card -->
      <div class="video">
        <img src="https://via.placeholder.com/250x140" alt="Video thumbnail">
        <div class="info">
          <div class="title">Another Video</div>
          <div class="channel">Another Channel</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
